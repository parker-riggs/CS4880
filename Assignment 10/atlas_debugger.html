<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprite Atlas Debugger — The Forgotten Realm</title>
  <style>
    :root {
      --bg:      #0d0d1a;
      --surface: #151528;
      --surface2:#1e1e38;
      --surface3:#252548;
      --accent:  #f0c060;
      --accent2: #80d0ff;
      --text:    #c8c8e0;
      --muted:   #5858a0;
      --red:     #ff3344;
      --green:   #50d080;
      --border:  #2a2a50;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      min-height: 100vh;
    }

    /* ── Header ───────────────────────────────────────────────── */
    #header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px 8px;
      user-select: none;
    }

    #title {
      font-size: 15px;
      color: var(--accent);
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    #search {
      background: var(--bg);
      border: 1px solid var(--muted);
      color: var(--text);
      padding: 5px 10px;
      font-family: inherit;
      font-size: 12px;
      width: 280px;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { outline: none; border-color: var(--accent); }

    .control-group { display: flex; align-items: center; gap: 8px; }
    .control-label { color: var(--muted); }
    input[type=range] { accent-color: var(--accent); width: 80px; cursor: pointer; }
    #scale-val { color: var(--accent); min-width: 28px; }

    label.toggle {
      display: flex; align-items: center; gap: 6px;
      color: var(--muted); cursor: pointer;
    }
    label.toggle input { accent-color: var(--green); cursor: pointer; }
    label.toggle:hover { color: var(--text); }

    #stats { color: var(--muted); font-size: 11px; margin-left: auto; }

    /* ── Tabs ─────────────────────────────────────────────────── */
    #tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
    }

    .tab {
      padding: 4px 14px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .tab:hover { color: var(--text); border-color: var(--muted); }
    .tab.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: bold;
    }
    .tab .count {
      font-size: 10px;
      opacity: 0.65;
      margin-left: 4px;
    }

    /* ── Main grid area ───────────────────────────────────────── */
    #main { padding: 16px; }

    .sheet-section { margin-bottom: 24px; }

    .sheet-heading {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 10px;
      background: var(--surface2);
      border-left: 3px solid var(--muted);
      margin-bottom: 8px;
      color: var(--accent2);
      font-size: 11px;
    }
    .sheet-heading .sheet-count {
      color: var(--muted);
      margin-left: auto;
    }

    .sprite-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-start;
    }

    /* ── Sprite item ──────────────────────────────────────────── */
    .sprite-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 5px;
      background: var(--surface2);
      border: 1px solid transparent;
      cursor: default;
      transition: border-color 0.1s;
      position: relative;
    }
    .sprite-item:hover { border-color: var(--muted); }

    .sprite-item canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Red outline for UNKNOWN — on the canvas itself */
    .sprite-item.unknown canvas {
      outline: 1px solid var(--red);
    }

    .sprite-label {
      color: var(--muted);
      font-size: 9px;
      text-align: center;
      max-width: 120px;
      word-break: break-all;
      line-height: 1.3;
    }
    .sprite-item:hover .sprite-label { color: var(--text); }
    .sprite-item.unknown .sprite-label { color: var(--red); }

    .anim-badge {
      font-size: 8px;
      color: var(--green);
      line-height: 1;
    }

    /* ── Messages ─────────────────────────────────────────────── */
    .message {
      padding: 32px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }
    .message code {
      background: var(--surface2);
      padding: 2px 6px;
      color: var(--accent);
      border: 1px solid var(--border);
    }
    .message .err { color: var(--red); margin-bottom: 12px; font-size: 15px; }

    /* ── Tooltip ──────────────────────────────────────────────── */
    #tooltip {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: var(--surface3);
      border: 1px solid var(--border);
      padding: 8px 12px;
      font-size: 11px;
      color: var(--text);
      max-width: 360px;
      line-height: 1.6;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 300;
      white-space: pre;
    }
    #tooltip.visible { opacity: 1; }
    #tooltip .key { color: var(--muted); }
    #tooltip .val { color: var(--accent2); }
  </style>
</head>
<body>

<div id="header">
  <div id="title">&#9654; SPRITE ATLAS DEBUGGER &mdash; THE FORGOTTEN REALM</div>
  <div id="controls">
    <input type="text" id="search" placeholder="Filter by id…" autocomplete="off" spellcheck="false">

    <div class="control-group">
      <span class="control-label">Scale:</span>
      <input type="range" id="scale-slider" min="1" max="6" value="3" step="1">
      <span id="scale-val">3×</span>
    </div>

    <label class="toggle">
      <input type="checkbox" id="animate-toggle"> Animate
    </label>

    <span id="stats"></span>
  </div>
  <div id="tabs"></div>
</div>

<div id="main">
  <div class="message">Loading atlas…</div>
</div>

<div id="tooltip"></div>

<script>
/* ─────────────────────────────────────────────────────────────────────────
   State
───────────────────────────────────────────────────────────────────────── */
let atlas        = null;
let activeTab    = null;
let filterText   = '';
let scale        = 3;
let doAnimate    = false;

const imgCache     = new Map();   // src → Promise<HTMLImageElement>
const animHandles  = new Set();   // setInterval IDs to cancel on re-render

/* ─────────────────────────────────────────────────────────────────────────
   Image loading
───────────────────────────────────────────────────────────────────────── */
function loadImage(src) {
  if (!imgCache.has(src)) {
    const p = new Promise((res, rej) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload  = () => res(img);
      img.onerror = () => rej(new Error('Cannot load ' + src));
      img.src = src;
    });
    imgCache.set(src, p);
  }
  return imgCache.get(src);
}

/* ─────────────────────────────────────────────────────────────────────────
   Frame width heuristic
   Handles two atlas conventions:
     A) sw = total strip width, frame_w = sw / frames  (characters, particles)
     B) sw = single frame,      frame_w = sw            (FX elemental/magic)
───────────────────────────────────────────────────────────────────────── */
function frameWidth(entry) {
  if (entry.frames <= 1) return entry.sw;
  const perFrame = entry.sw / entry.frames;
  // If dividing produces a frame at least 40% of the sprite height → convention A
  return (perFrame >= entry.sh * 0.4) ? perFrame : entry.sw;
}

/* ─────────────────────────────────────────────────────────────────────────
   Canvas drawing
───────────────────────────────────────────────────────────────────────── */
function drawCheckerboard(ctx, w, h) {
  const size = 8;
  for (let y = 0; y < h; y += size) {
    for (let x = 0; x < w; x += size) {
      ctx.fillStyle = ((Math.floor(y / size) + Math.floor(x / size)) % 2 === 0)
        ? '#151528' : '#1e1e38';
      ctx.fillRect(x, y, size, size);
    }
  }
}

function renderFrame(ctx, img, entry, frameIndex) {
  const fw   = frameWidth(entry);
  const isFxConvention = fw === entry.sw;           // convention B: sw is one frame
  const srcX = isFxConvention
    ? entry.sx + frameIndex * entry.sw              // B: step by sw
    : entry.sx + frameIndex * fw;                   // A: step by fw within strip
  const dw = fw * scale;
  const dh = entry.sh * scale;
  drawCheckerboard(ctx, dw, dh);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(img, srcX, entry.sy, fw, entry.sh, 0, 0, dw, dh);
}

function startDraw(canvas, entry, img) {
  const fw = frameWidth(entry);
  const dw = fw   * scale;
  const dh = entry.sh * scale;
  canvas.width  = dw;
  canvas.height = dh;
  const ctx = canvas.getContext('2d');

  if (!entry.animated || !doAnimate || entry.frames <= 1) {
    renderFrame(ctx, img, entry, 0);
    return;
  }

  let frame = 0;
  const fd = entry.frameDuration || 150;
  renderFrame(ctx, img, entry, 0);
  const id = setInterval(() => {
    if (!document.body.contains(canvas)) { clearInterval(id); return; }
    frame = (frame + 1) % entry.frames;
    renderFrame(ctx, img, entry, frame);
  }, fd);
  animHandles.add(id);
  canvas.__animId = id;
}

function initCanvas(canvas, entry) {
  const fw = frameWidth(entry);
  canvas.width  = fw * scale;
  canvas.height = entry.sh * scale;
  const ctx = canvas.getContext('2d');
  drawCheckerboard(ctx, canvas.width, canvas.height);

  loadImage(entry.file)
    .then(img => startDraw(canvas, entry, img))
    .catch(() => {
      const ctx2 = canvas.getContext('2d');
      ctx2.fillStyle = '#300';
      ctx2.fillRect(0, 0, canvas.width, canvas.height);
      ctx2.fillStyle = '#f44';
      ctx2.font = `${Math.max(8, scale * 4)}px monospace`;
      ctx2.fillText('ERR', 2, canvas.height / 2 + 3);
    });
}

/* ─────────────────────────────────────────────────────────────────────────
   IntersectionObserver — lazy draw
───────────────────────────────────────────────────────────────────────── */
let observer = null;

function makeObserver() {
  if (observer) observer.disconnect();
  observer = new IntersectionObserver(entries => {
    for (const oe of entries) {
      if (oe.isIntersecting && !oe.target.__drawn) {
        oe.target.__drawn = true;
        initCanvas(oe.target, oe.target.__entry);
        observer.unobserve(oe.target);
      }
    }
  }, { rootMargin: '400px' });
  return observer;
}

/* ─────────────────────────────────────────────────────────────────────────
   Sprite item DOM
───────────────────────────────────────────────────────────────────────── */
const tooltip = document.getElementById('tooltip');

function buildItem(entry) {
  const isUnknown = entry.id.startsWith('UNKNOWN');
  const fw = frameWidth(entry);

  const item = document.createElement('div');
  item.className = 'sprite-item' + (isUnknown ? ' unknown' : '');

  const canvas = document.createElement('canvas');
  canvas.width  = fw  * scale;
  canvas.height = entry.sh * scale;
  canvas.__entry = entry;
  canvas.__drawn = false;

  // draw checkerboard placeholder
  const ctx = canvas.getContext('2d');
  drawCheckerboard(ctx, canvas.width, canvas.height);

  // tooltip on hover
  item.addEventListener('mouseenter', () => {
    tooltip.innerHTML =
      `<span class="key">id         </span><span class="val">${entry.id}</span>\n` +
      `<span class="key">sheet      </span><span class="val">${entry.sheet}</span>\n` +
      `<span class="key">file       </span><span class="val">${entry.file}</span>\n` +
      `<span class="key">src rect   </span><span class="val">sx:${entry.sx} sy:${entry.sy} sw:${entry.sw} sh:${entry.sh}</span>\n` +
      `<span class="key">animated   </span><span class="val">${entry.animated ? `yes — ${entry.frames} frames @ ${entry.frameDuration||'?'}ms` : 'no'}</span>`;
    tooltip.classList.add('visible');
  });
  item.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));

  observer.observe(canvas);

  const label = document.createElement('div');
  label.className = 'sprite-label';
  label.textContent = entry.id;

  item.appendChild(canvas);

  if (entry.animated) {
    const badge = document.createElement('div');
    badge.className = 'anim-badge';
    badge.textContent = `▶ ${entry.frames}f`;
    item.appendChild(badge);
  }

  item.appendChild(label);
  return item;
}

/* ─────────────────────────────────────────────────────────────────────────
   Render category
───────────────────────────────────────────────────────────────────────── */
function clearAnimations() {
  for (const id of animHandles) clearInterval(id);
  animHandles.clear();
}

function renderCategory(cat) {
  clearAnimations();
  makeObserver();

  const main = document.getElementById('main');
  main.innerHTML = '';

  const entries = atlas[cat] || [];
  const filter  = filterText;
  const visible = filter ? entries.filter(e => e.id.toLowerCase().includes(filter)) : entries;

  // group by sheet
  const bySheet = new Map();
  for (const e of visible) {
    if (!bySheet.has(e.sheet)) bySheet.set(e.sheet, []);
    bySheet.get(e.sheet).push(e);
  }

  const statsEl = document.getElementById('stats');
  statsEl.textContent = `${visible.length} / ${entries.length} sprites · ${bySheet.size} sheets`;

  if (visible.length === 0) {
    main.innerHTML = '<div class="message">No sprites match the current filter.</div>';
    return;
  }

  const frag = document.createDocumentFragment();

  for (const [sheet, items] of bySheet) {
    const section = document.createElement('div');
    section.className = 'sheet-section';

    const heading = document.createElement('div');
    heading.className = 'sheet-heading';
    heading.innerHTML = `<span>${sheet}</span><span class="sheet-count">${items.length} sprites</span>`;
    section.appendChild(heading);

    const grid = document.createElement('div');
    grid.className = 'sprite-grid';
    for (const entry of items) {
      grid.appendChild(buildItem(entry));
    }
    section.appendChild(grid);
    frag.appendChild(section);
  }

  main.appendChild(frag);
}

/* ─────────────────────────────────────────────────────────────────────────
   Tab switch
───────────────────────────────────────────────────────────────────────── */
function switchTab(cat) {
  activeTab = cat;
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.cat === cat));
  renderCategory(cat);
}

/* ─────────────────────────────────────────────────────────────────────────
   Init
───────────────────────────────────────────────────────────────────────── */
async function init() {
  // Load atlas
  let data;
  try {
    const res = await fetch('sprite_atlas.json');
    if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
    data = await res.json();
  } catch (err) {
    document.getElementById('main').innerHTML = `
      <div class="message">
        <div class="err">⚠ Could not load sprite_atlas.json</div>
        Serve this file via a local HTTP server from the <strong>Assignment 10</strong> folder:<br><br>
        <code>python -m http.server 8000</code><br><br>
        Then open <code>http://localhost:8000/atlas_debugger.html</code><br><br>
        <small style="color:#5858a0">${err}</small>
      </div>`;
    return;
  }
  atlas = data;

  // Build tabs
  const tabsEl = document.getElementById('tabs');
  const ICONS = { terrain:'🌿', dungeon:'🏚', character:'🧍', creature:'🐉', fx:'✨', item:'🗡️', ui:'🖼' };
  for (const [cat, items] of Object.entries(atlas)) {
    const tab = document.createElement('div');
    tab.className = 'tab';
    tab.dataset.cat = cat;
    tab.innerHTML = `${ICONS[cat] || ''} ${cat}<span class="count">${items.length}</span>`;
    tab.addEventListener('click', () => switchTab(cat));
    tabsEl.appendChild(tab);
  }

  // Scale slider
  const slider = document.getElementById('scale-slider');
  slider.addEventListener('input', () => {
    scale = +slider.value;
    document.getElementById('scale-val').textContent = scale + '×';
    if (activeTab) renderCategory(activeTab);
  });

  // Animate toggle
  document.getElementById('animate-toggle').addEventListener('change', e => {
    doAnimate = e.target.checked;
    if (activeTab) renderCategory(activeTab);
  });

  // Search
  let debounce;
  document.getElementById('search').addEventListener('input', e => {
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      filterText = e.target.value.toLowerCase().trim();
      if (activeTab) renderCategory(activeTab);
    }, 200);
  });

  // First tab
  const firstCat = Object.keys(atlas)[0];
  switchTab(firstCat);
}

init();
</script>
</body>
</html>
