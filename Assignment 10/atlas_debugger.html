<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sprite Atlas Debugger — The Forgotten Realm</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d14;
    color: #e0d8c8;
    font-family: 'Courier New', monospace;
    font-size: 12px;
  }

  #header {
    position: sticky; top: 0; z-index: 100;
    background: #12121e; border-bottom: 2px solid #c89020;
    padding: 10px 16px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  #header h1 { color: #c89020; font-size: 14px; white-space: nowrap; }
  #stats { color: #888; font-size: 11px; }
  #stats span { color: #e0d8c8; }
  #filter-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  #search {
    background: #1e1e2e; border: 1px solid #444; color: #e0d8c8;
    padding: 4px 8px; font-family: inherit; font-size: 11px; width: 200px;
  }
  .cat-btn {
    padding: 3px 8px; font-size: 11px; cursor: pointer; font-family: inherit;
    background: #1e1e2e; border: 1px solid #555; color: #aaa;
  }
  .cat-btn.active { background: #c89020; border-color: #c89020; color: #000; font-weight: bold; }
  #progress-bar { width: 100%; height: 3px; background: #1e1e2e; position: sticky; top: 52px; z-index: 99; }
  #progress-fill { height: 100%; background: #c89020; width: 0%; transition: width 0.15s; }

  #main { padding: 12px 16px; }
  .cat-section { margin-bottom: 32px; }
  .cat-title {
    font-size: 13px; color: #c89020; letter-spacing: 2px; text-transform: uppercase;
    border-bottom: 1px solid #333; padding-bottom: 4px; margin-bottom: 10px;
  }
  .cat-title span { color: #555; font-size: 11px; }
  .sprite-grid { display: flex; flex-wrap: wrap; gap: 6px; }

  .sprite-card {
    background: #1a1a2a; border: 1px solid #333; border-radius: 2px;
    padding: 4px; width: 80px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .sprite-card.error { border-color: #e82020 !important; background: #2a1018; }
  .sprite-card:hover { border-color: #888; }

  .canvas-wrap {
    width: 48px; height: 48px; background: #111;
    border: 1px solid #222;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .canvas-wrap canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
  .err-flag {
    position: absolute; inset: 0; border: 2px solid #e82020;
    background: rgba(232,32,32,0.12);
    display: none; align-items: center; justify-content: center;
    font-size: 20px; color: #e82020;
  }
  .sprite-card.error .err-flag { display: flex; }

  .sprite-label {
    font-size: 9px; color: #777; text-align: center;
    max-width: 72px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .sprite-card:hover .sprite-label { color: #e0d8c8; }
  .sprite-meta { font-size: 8px; color: #555; text-align: center; }
  .sprite-card.error .sprite-meta { color: #e82020; }

  #tooltip {
    position: fixed; bottom: 12px; right: 12px;
    background: #12121e; border: 1px solid #c89020;
    padding: 10px 12px; font-size: 11px; max-width: 340px;
    line-height: 1.7; z-index: 999; display: none; pointer-events: none;
  }
  #tooltip .tt-id { color: #c89020; font-weight: bold; }
  #tooltip .tt-file { color: #666; word-break: break-all; }
  #tooltip .tt-err { color: #e82020; margin-top: 4px; }

  #error-summary {
    background: #1a0808; border: 1px solid #e82020;
    padding: 10px 12px; margin-bottom: 16px; display: none;
  }
  #error-summary h3 { color: #e82020; margin-bottom: 6px; font-size: 12px; }
  #error-summary li { color: #cc8888; margin: 2px 0 2px 16px; font-size: 11px; }

  #loading {
    position: fixed; inset: 0; background: #0d0d14;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 1000; gap: 12px;
  }
  #loading h2 { color: #c89020; letter-spacing: 4px; }
  #loading p { color: #666; font-size: 11px; }
  #load-bar { width: 300px; height: 4px; background: #1e1e2e; }
  #load-fill { height: 100%; background: #c89020; width: 0%; transition: width 0.1s; }
</style>
</head>
<body>

<div id="loading">
  <h2>ATLAS DEBUGGER</h2>
  <p id="load-label">Loading sprite_atlas.json…</p>
  <div id="load-bar"><div id="load-fill"></div></div>
  <p id="load-count"></p>
</div>

<div id="header" style="display:none">
  <h1>SPRITE ATLAS DEBUGGER</h1>
  <div id="stats">
    Entries: <span id="stat-total">0</span> &nbsp;|&nbsp;
    OK: <span id="stat-ok" style="color:#7ab648">0</span> &nbsp;|&nbsp;
    Errors: <span id="stat-err" style="color:#e82020">0</span>
  </div>
  <div id="filter-bar">
    <input id="search" type="text" placeholder="Search sprite id…">
    <div id="cat-buttons"></div>
  </div>
</div>
<div id="progress-bar"><div id="progress-fill"></div></div>

<div id="main">
  <div id="error-summary"><h3>Errors</h3><ul id="error-list"></ul></div>
  <div id="sections"></div>
</div>
<div id="tooltip"></div>

<script>
'use strict';

const ATLAS_PATH   = 'sprite_atlas.json';
const DISPLAY_SIZE = 48;
const MAX_SCALE    = 3;
const CAT_ORDER    = ['terrain','dungeon','character','creature','fx','item','ui'];

let atlas = {}, imgCache = {}, errors = [], animHandles = [];
let currentCat = 'all', searchTerm = '';

// ── Boot ─────────────────────────────────────────────────────────────────────
(async function boot() {
  let atlasData;
  try {
    const r = await fetch(ATLAS_PATH);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    atlasData = await r.json();
  } catch(e) {
    document.getElementById('load-label').textContent = 'ERROR: ' + e;
    document.getElementById('load-label').style.color = '#e82020';
    return;
  }
  atlas = atlasData;

  const files = [...new Set(
    Object.values(atlas).flat().map(e => e.file)
  )];
  document.getElementById('load-label').textContent = 'Loading ' + files.length + ' sprite sheets…';

  let n = 0;
  await Promise.all(files.map(fp =>
    new Promise(res => {
      const img = new Image();
      img.onload  = () => { imgCache[fp] = img; done(); };
      img.onerror = () => { imgCache[fp] = null; done(); };
      img.src = fp;
      function done() {
        n++;
        document.getElementById('load-fill').style.width = (n/files.length*100) + '%';
        document.getElementById('load-count').textContent = n + ' / ' + files.length;
        res();
      }
    })
  ));

  document.getElementById('loading').style.display  = 'none';
  document.getElementById('header').style.display   = 'flex';
  buildUI();
})();

// ── Render one entry to a canvas, return { ok, reason } ──────────────────────
function renderEntry(e, cvs) {
  const ctx = cvs.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, cvs.width, cvs.height);

  const img = imgCache[e.file];
  if (!img) return { ok: false, reason: 'Sheet failed to load: ' + e.file };

  const isSingle = (e.type === 'single');
  const sx = e.sx || 0;
  const sy = e.sy || 0;
  const sw = isSingle ? img.naturalWidth  : (e.sw || 16);
  const sh = isSingle ? img.naturalHeight : (e.sh || 16);
  const frames = e.frames || 1;

  if (!isSingle) {
    if (sx + sw * frames > img.naturalWidth || sy + sh > img.naturalHeight) {
      return {
        ok: false,
        reason: `Out of bounds: sx=${sx} sy=${sy} sw=${sw} sh=${sh} frames=${frames} — sheet is ${img.naturalWidth}×${img.naturalHeight}`
      };
    }
  }

  const scale = Math.min(DISPLAY_SIZE / sw, DISPLAY_SIZE / sh, MAX_SCALE);
  const dw = Math.round(sw * scale);
  const dh = Math.round(sh * scale);
  const ox = Math.floor((DISPLAY_SIZE - dw) / 2);
  const oy = Math.floor((DISPLAY_SIZE - dh) / 2);
  ctx.drawImage(img, sx, sy, sw, sh, ox, oy, dw, dh);
  return { ok: true, sw, sh };
}

// ── Animated preview ─────────────────────────────────────────────────────────
function startAnim(e, cvs) {
  const img = imgCache[e.file];
  if (!img || (e.frames || 1) <= 1) return;
  const sw = e.sw || 16, sh = e.sh || 16;
  const sx0 = e.sx || 0, sy = e.sy || 0;
  const dur = e.frameDuration || 150;
  const scale = Math.min(DISPLAY_SIZE/sw, DISPLAY_SIZE/sh, MAX_SCALE);
  const dw = Math.round(sw*scale), dh = Math.round(sh*scale);
  const ox = Math.floor((DISPLAY_SIZE-dw)/2), oy = Math.floor((DISPLAY_SIZE-dh)/2);
  let frame = 0, last = 0;
  function tick(now) {
    if (now - last >= dur) {
      last = now;
      frame = (frame + 1) % e.frames;
      const ctx = cvs.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      ctx.clearRect(0, 0, cvs.width, cvs.height);
      ctx.drawImage(img, sx0 + frame * sw, sy, sw, sh, ox, oy, dw, dh);
    }
    animHandles.push(requestAnimationFrame(tick));
  }
  animHandles.push(requestAnimationFrame(tick));
}

// ── Build UI ─────────────────────────────────────────────────────────────────
function buildUI() {
  const cb = document.getElementById('cat-buttons');
  ['all', ...CAT_ORDER].forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === 'all' ? ' active' : '');
    btn.textContent = cat === 'all' ? 'ALL' : cat.toUpperCase();
    btn.dataset.cat = cat;
    btn.onclick = () => {
      currentCat = cat;
      document.querySelectorAll('.cat-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.cat === cat));
      render();
    };
    cb.appendChild(btn);
  });
  document.getElementById('search').oninput = e => {
    searchTerm = e.target.value.toLowerCase();
    render();
  };
  render();
}

function render() {
  animHandles.forEach(cancelAnimationFrame);
  animHandles = [];
  errors = [];

  const sections = document.getElementById('sections');
  sections.innerHTML = '';
  let total = 0;

  for (const cat of CAT_ORDER) {
    if (currentCat !== 'all' && currentCat !== cat) continue;
    const entries = (atlas[cat] || []).filter(e =>
      !searchTerm || e.id.toLowerCase().includes(searchTerm)
    );
    if (!entries.length) continue;

    const sec = document.createElement('div');
    sec.className = 'cat-section';
    const title = document.createElement('div');
    title.className = 'cat-title';
    title.innerHTML = cat + ' <span>(' + entries.length + ')</span>';
    sec.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'sprite-grid';

    for (const e of entries) {
      const card = document.createElement('div');
      card.className = 'sprite-card';

      const wrap = document.createElement('div');
      wrap.className = 'canvas-wrap';
      const cvs = document.createElement('canvas');
      cvs.width = cvs.height = DISPLAY_SIZE;
      const errFlag = document.createElement('div');
      errFlag.className = 'err-flag';
      errFlag.textContent = '✖';
      wrap.append(cvs, errFlag);

      const result = renderEntry(e, cvs);

      if (!result.ok) {
        card.classList.add('error');
        errors.push({ id: e.id, file: e.file, reason: result.reason });
      } else {
        startAnim(e, cvs);
      }

      const img = imgCache[e.file];
      let meta;
      if (e.type === 'single') {
        meta = img ? img.naturalWidth + '×' + img.naturalHeight : 'load-err';
      } else {
        meta = (e.sw || '?') + '×' + (e.sh || '?');
        if ((e.frames||1) > 1) meta += ' ×' + e.frames;
      }

      const label = document.createElement('div');
      label.className = 'sprite-label';
      label.textContent = e.id;

      const metaDiv = document.createElement('div');
      metaDiv.className = 'sprite-meta';
      metaDiv.textContent = result.ok ? meta : 'ERROR';

      card.append(wrap, label, metaDiv);
      card.addEventListener('mouseenter', () => showTip(e, result, img));
      card.addEventListener('mouseleave',  hideTip);
      grid.appendChild(card);
      total++;
    }

    sec.appendChild(grid);
    sections.appendChild(sec);
  }

  // Stats
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-ok').textContent    = total - errors.length;
  document.getElementById('stat-err').textContent   = errors.length;
  document.getElementById('progress-fill').style.width = '100%';

  // Error summary
  const errDiv  = document.getElementById('error-summary');
  const errList = document.getElementById('error-list');
  errList.innerHTML = '';
  if (errors.length) {
    errDiv.style.display = 'block';
    errors.forEach(err => {
      const li = document.createElement('li');
      li.textContent = '[' + err.id + '] — ' + err.reason;
      errList.appendChild(li);
    });
  } else {
    errDiv.style.display = 'none';
  }
}

// ── Tooltip ──────────────────────────────────────────────────────────────────
function showTip(e, result, img) {
  const tt = document.getElementById('tooltip');
  const shDims = img ? img.naturalWidth + '×' + img.naturalHeight : 'N/A';
  const sw = e.type === 'single' ? (img ? img.naturalWidth : 'N/A') : (e.sw || '?');
  const sh = e.type === 'single' ? (img ? img.naturalHeight : 'N/A') : (e.sh || '?');
  let html = `<div class="tt-id">${e.id}</div>`;
  html += `<div class="tt-file">${e.file}</div>`;
  html += `<div>type: <b>${e.type||'sheet'}</b> | sheet: ${shDims}</div>`;
  html += `<div>sx=${e.sx||0}  sy=${e.sy||0}  sw=${sw}  sh=${sh}</div>`;
  if ((e.frames||1) > 1) html += `<div>frames: ${e.frames}  dur: ${e.frameDuration}ms</div>`;
  if (!result.ok) html += `<div class="tt-err">✖ ${result.reason}</div>`;
  tt.innerHTML = html;
  tt.style.display = 'block';
}
function hideTip() { document.getElementById('tooltip').style.display = 'none'; }
</script>
</body>
</html>
